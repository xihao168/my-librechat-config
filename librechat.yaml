version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4-1-fast-reasoning"
          - "grok-4"
          - "grok-3-mini"
          - "grok-2-vision"
        fetch: true
      web_search: true

# agents:  # ← 註釋掉或直接刪除這整塊
#   recursionLimit: 25
#   maxRecursionLimit: 50
#   capabilities:
#     - "chain"
#     - "web_search"
#     - "execute_code"

interface:
  title: "Grok"
  modelSelect: true
  parameters: true

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "Grok Default"
      label: "Grok"
      default: true
      preset:
        endpoint: "xai api"
        model: "grok-4-1-fast-reasoning"
        systemMessage: "You are Grok, built by xAI. Always honest and professional."
