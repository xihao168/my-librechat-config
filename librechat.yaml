# For more information, see the Configuration Guide:
# https://www.librechat.ai/docs/configuration/librechat_yaml

# Configuration version (required)
version: 1.3.6

# Cache settings: Set to true to enable caching
cache: true

# Custom interface configuration
interface:
  # Privacy policy settings
  privacyPolicy:
    externalUrl: 'https://librechat.ai/privacy-policy'
    openNewTab: true

  # Terms of service
  termsOfService:
    externalUrl: 'https://librechat.ai/tos'
    openNewTab: true

  endpointsMenu: false  # Set to false to hide other endpoints (only show Grok)
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileSearch: true  # Enables file search
  fileCitations: true

# Registration settings
registration:
  socialLogins: ['github', 'google', 'discord', 'openid', 'facebook', 'apple', 'saml']

# Memory configuration
memory:
  disabled: false
  personalize: true
  tokenLimit: 4000
  charLimit: 10000
  messageWindowSize: 10

# Search configuration (Tavily + Jina)
search:
  disabled: false
  tavilyApiKey: "${TAVILY_API_KEY}"
  jinaApiKey: "${JINA_API_KEY}"
  rerankerType: jina
  # Optional: Add if you have it for better scraping
  # scraperProvider: firecrawl
  # firecrawlApiKey: "${FIRECRAWL_API_KEY}"

# Definition of custom endpoints (only Grok/xAI)
endpoints:
  custom:
    - name: xai
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default: ["grok-4-1-fast-reasoning]  # Stable default; add others like "grok-4" if needed
        fetch: true
      titleConvo: true
      titleModel: "grok-4-1-fast-reasoning"
      summarize: false
      summaryModel: "grok-4-1-fast-reasoning"
      forcePrompt: false
      modelDisplayLabel: "Grok"

  agents:
    provider: openai-compatible  # Compatible with xAI
    apiKey: "${XAI_API_KEY}"
    baseURL: "https://api.x.ai/v1"
    models:
      default: ["grok-beta"]
      fetch: true
    capabilities:
      - file_search  # Your file search
      - web_search   # Integrates with Tavily/Jina
      - tools        # Enables advanced tools

# Other defaults from original (unchanged, for completeness)
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'librechat.ai'
    - 'google.com'
