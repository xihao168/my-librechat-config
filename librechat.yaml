# For more information, see the Configuration Guide:
# https://www.librechat.ai/docs/configuration/librechat_yaml

version: 1.3.6

cache: true

interface:
  fileSearch: true          # Enables file search selection in chat area
  agents:
    use: true
    create: true
    share: false
    public: false
  # Keep other useful UI features enabled (feel free to disable if unwanted)
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts:
    use: true
    create: true
  bookmarks: true
  multiConvo: true
  fileCitations: true

# Search configuration - using Jina + Tavily
search:
  enabled: true
  defaultSearch: true       # Use these as fallback/available options
  engines:
    - name: "Jina"
      # Jina Reader/Search API (often used via https://s.jina.ai/ for search)
      # You may need to set JINA_API_KEY in your .env if using paid features
      # LibreChat typically supports Jina via custom agent tools or built-in integration
    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"   # Required - get from https://tavily.com
      # Tavily is natively supported in LibreChat for web search

# Agents configuration (enable file search capability explicitly)
endpoints:
  agents:
    capabilities: ["file_search", "actions", "tools", "deferred_tools", "execute_code"]

# Use xAI (Grok) as the main/only endpoint
# Place this under custom: [] and LibreChat will show only this (or comment out others)
  custom:
    - name: "Grok"
      apiKey: "${XAI_API_KEY}"                  # Required - from https://console.x.ai/
      baseURL: "https://api.x.ai/v1"
      models:
        default: 
          - "grok-4-1-fast-reasoning"           # Your requested default/fast reasoning model
          # Add others if desired (uncomment)
          # - "grok-4-1-fast-non-reasoning"
          # - "grok-4"
          # - "grok-3"
        # You can set fetch: true if you want LibreChat to pull available models dynamically
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4-1-fast-reasoning"     # Use fast model for titles too
      summarize: false
      summaryModel: "grok-4-1-fast-reasoning"
      modelDisplayLabel: "Grok"
      # Optional: force the default model on new chats
      # You can also set this via UI presets after login
      default: true                             # Makes this endpoint/model the default

# Optional: Disable other built-in endpoints if you really want Grok-only
# (LibreChat usually shows all unless you override or remove them in docker-compose setup)
# openAI: null
# anthropic: null
# etc.

# Other optional sections you might want to keep/adjust
# actions:
#   allowedDomains:
#     - '*'   # Be careful with this in production

# agents:
#   recursionLimit: 25
#   maxCitations: 30
