version: 1.3.6

interface:
  fileSearch: true
  agents:
    use: true

search:
  enabled: true
  engines:
    - name: "Tavily"
      apiKey: "${TAVILY_API_KEY}"

endpoints:
  custom:
    - name: "Grok"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default: ["grok-4-1-fast-reasoning"]
      default: true
