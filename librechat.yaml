# librechat.yaml 檔案
# 版本必須與部署的 LibreChat 相容（v0.8.3-rc2）
version: 1.3.5
cache: true

# 介面設定（可自訂標題、隱私等）
interface:
  title: "Grok"
  modelSelect: true          # 顯示模型選擇下拉
  parameters: true           # 顯示溫度、Top P 等參數調整
  sidePanel: true
  presets: true
  multiConvo: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  agents:
    use: true
    create: true
    share: false
    public: false

# 自訂端點：只保留 xAI / Grok
endpoints:
  custom:
    - name: "xai"
      apiKey: "${XAI_API_KEY}"          # 必須用這個占位符，勿填真實 Key
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4-1-fast-reasoning"   # 預設模型
          - "grok-4"                    # 旗艦版
          - "grok-3-mini"               # 省錢版
          - "grok-2-vision"             # 圖像理解版
        fetch: false                    # 不自動拉取其他模型
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4-1-fast-reasoning"
      summarize: true
      summaryModel: "grok-4-1-fast-reasoning"
      modelDisplayLabel: "Grok"
      web_search: true                  # 強制啟用 Web Search

# 預設
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "Grok"
      label: "Grok"
      default: true
      preset:
        endpoint: "xai"
        model: "grok-4-1-fast-reasoning"
        systemMessage: |
          You are Grok, built by xAI. Always be honest, professional, and helpful. For any questions about xAI, Grok models, or recent events, ALWAYS use the latest context from web search. Ignore outdated data. Prioritize recent news and official sources.
