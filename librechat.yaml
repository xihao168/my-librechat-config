version: 1.3.6
cache: true

interface:
  fileSearch: true          # Enables file search in chat
  endpointsMenu: false      # Hides other endpoints (only Grok shows)
  modelSelect: true

# ── ONLY GROK (xAI) ─────────────────────────────────────
endpoints:
  custom:
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default: ["grok-4-1-fast-reasoning"]   # Add/remove as you like
        fetch: true                                       # Auto-detects newest models
      titleConvo: true
      titleModel: "grok-4"
      summarize: false
      modelDisplayLabel: "Grok"

# ── TAVILY + JINA WEB SEARCH ────────────────────────────
webSearch:
  # Tavily works via Agents tool (recommended) + key is recognized
  tavilyApiKey: "${TAVILY_API_KEY}"
  # Jina as reranker (official)
  jinaApiKey: "${JINA_API_KEY}"
  rerankerType: "jina"
  # Optional but highly recommended for better scraping:
  # firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  # scraperProvider: "firecrawl"

# ── MEMORY FUNCTION ─────────────────────────────────────
memory:
  disabled: false
  personalize: true          # Users can toggle memory on/off
  tokenLimit: 4000
  charLimit: 10000
  messageWindowSize: 10

# ── AGENTS (best for Tavily + File Search) ──────────────
endpoints:
  agents:
    capabilities:
      - "file_search"      # Your file search
      - "web_search"       # Built-in + Tavily tool
      - "tools"            # Enables Tavily Search tool automatically
