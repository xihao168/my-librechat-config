version: 1.3.5
cache: true

interface:
  title: "Grok"
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  multiConvo: true
  endpointsMenu: false
  disableDefaultEndpoints: true
  web_search: true
  web_search_default: true

endpoints:
  custom:
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        fetch: true
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok"
      summarize: true
      summaryModel: "grok"
      modelDisplayLabel: "Grok"
