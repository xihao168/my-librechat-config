# librechat.yaml（簡化版，適合 v0.8.3-rc2）
version: 1.3.5
cache: true

interface:
  title: "Grok"
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  multiConvo: true

endpoints:
  custom:
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - "grok-4-1-fast-reasoning"   # 你最常用的模型放第一
          - "grok-4"
        fetch: true                   
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-4-1-fast-reasoning"
      summarize: true
      summaryModel: "grok-4-1-fast-reasoning"
      modelDisplayLabel: "Grok"
      web_search: true
      web_search_default: true
